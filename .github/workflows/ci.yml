name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: submodules/deep-agents-ui
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: submodules/deep-agents-ui/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn build

  # E2E tests run against a live stack.
  # Set up your LangGraph API + Deep Agents UI services before running.
  # For local dev: start services, then `act -j e2e` or `gh workflow run CI`.
  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: false  # Disabled by default — requires live stack. Enable when infra is ready.
    defaults:
      run:
        working-directory: submodules/deep-agents-ui
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: submodules/deep-agents-ui/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: yarn test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || 'http://127.0.0.1:3000' }}
          E2E_API_URL: ${{ secrets.E2E_API_URL || 'http://127.0.0.1:2024' }}
          E2E_ASSISTANT_ID: ${{ secrets.E2E_ASSISTANT_ID || 'alpha_ravis' }}
          E2E_SKIP_WEBSERVER: '1'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: submodules/deep-agents-ui/playwright-report/
          retention-days: 7
